<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JiraLog</title>
    <link rel="stylesheet" href="../styles/shared.css" />
    <link rel="stylesheet" href="./about.css" />
  </head>
  <body>
    <div class="page about">
      <section class="card page__prefs about__prefs" aria-labelledby="about-appearance-heading">
        <h2 class="section-title" id="about-appearance-heading"></h2>
        <div class="pref-row">
          <label class="pref-label" for="about-pref-theme" id="about-label-theme"></label>
          <select id="about-pref-theme" class="pref-control">
            <option value="system"></option>
            <option value="light"></option>
            <option value="dark"></option>
          </select>
        </div>
        <div class="pref-row">
          <label class="pref-label" for="about-pref-locale" id="about-label-locale"></label>
          <select id="about-pref-locale" class="pref-control">
            <option value="system"></option>
            <option value="de"></option>
            <option value="en"></option>
          </select>
        </div>
      </section>

      <header class="about__head">
        <h1 class="about__title" id="app-name">JiraLog</h1>
        <p class="muted about__tagline" id="app-desc"></p>
      </header>

      <dl class="about__meta card">
        <div class="about__row">
          <dt id="label-version"></dt>
          <dd id="meta-version">—</dd>
        </div>
        <div class="about__row">
          <dt id="label-author"></dt>
          <dd id="meta-author">—</dd>
        </div>
        <div class="about__row">
          <dt id="label-license"></dt>
          <dd id="meta-license">MIT</dd>
        </div>
      </dl>

      <section class="about__section card">
        <h2 id="about-project-heading"></h2>
        <p class="muted" id="about-project-body"></p>
      </section>

      <p class="about__actions">
        <a href="options.html" class="btn btn-ghost" id="link-settings"></a>
      </p>
    </div>
    <script type="module" src="./about.ts"></script>
  </body>
</html>
