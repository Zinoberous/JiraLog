<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JiraLog</title>
    <link rel="stylesheet" href="../styles/shared.css" />
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <div class="page">
      <section class="card page__prefs" aria-labelledby="appearance-heading">
        <h2 class="section-title" id="appearance-heading"></h2>
        <div class="pref-row">
          <label class="pref-label" for="pref-theme" id="label-theme"></label>
          <select id="pref-theme" class="pref-control">
            <option value="system"></option>
            <option value="light"></option>
            <option value="dark"></option>
          </select>
        </div>
        <div class="pref-row">
          <label class="pref-label" for="pref-locale" id="label-locale"></label>
          <select id="pref-locale" class="pref-control">
            <option value="system"></option>
            <option value="de"></option>
            <option value="en"></option>
          </select>
        </div>
      </section>

      <header class="page__header">
        <h1 class="page__title" id="connect-heading"></h1>
        <p class="muted" id="options-intro">
          <span id="intro-before"></span
          ><a
            id="intro-link-anchor"
            href="https://support.atlassian.com/atlassian-account/docs/manage-api-tokens-for-your-atlassian-account/"
            target="_blank"
            rel="noreferrer"
            ><span id="intro-link-text"></span></a
          ><span id="intro-after"></span>
        </p>
      </header>

      <form id="form-conn" class="card form" autocomplete="on">
        <div class="field">
          <label for="base-url" id="label-base"></label>
          <input
            id="base-url"
            name="baseUrl"
            type="url"
            required
            spellcheck="false"
          />
        </div>
        <div class="field">
          <label for="email" id="label-email"></label>
          <input
            id="email"
            name="email"
            type="email"
            required
            autoComplete="username"
          />
        </div>
        <div class="field">
          <label for="api-token" id="label-token"></label>
          <input
            id="api-token"
            name="apiToken"
            type="password"
            autoComplete="current-password"
            spellcheck="false"
          />
        </div>
        <div class="form__actions">
          <button type="submit" class="btn btn-primary" id="btn-save"></button>
          <button type="button" class="btn btn-ghost" id="btn-test"></button>
          <button type="button" class="btn btn-ghost" id="btn-clear"></button>
        </div>
        <p id="form-message" class="form-message" role="status"></p>
      </form>

      <footer class="page__footer">
        <a href="about.html" id="link-about"></a>
      </footer>
    </div>
    <script type="module" src="./options.ts"></script>
  </body>
</html>
