<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JiraLog</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div id="app" class="app">
    <header class="topbar">
      <div class="brand">
        <img class="brand-mark" src="icons/icon128.png" alt="JiraLog" />
        <div>
          <div class="brand-title">JiraLog</div>
          <div id="connectionState" class="brand-subtitle" data-i18n="disconnected">Disconnected</div>
        </div>
      </div>
      <nav class="tabs" aria-label="Navigation">
        <button id="tabWorklogs" class="tab" data-page="worklogs" title="Worklogs" aria-label="Worklogs"><svg class="mi"
            viewBox="0 0 24 24" aria-hidden="true">
            <use href="#mi-schedule" />
          </svg></button>
        <button id="tabSettings" class="tab" data-page="settings" title="Settings" aria-label="Settings"><svg class="mi"
            viewBox="0 0 24 24" aria-hidden="true">
            <use href="#mi-settings" />
          </svg></button>
        <button id="tabInfo" class="tab" data-page="info" title="Info" aria-label="Info"><svg class="mi"
            viewBox="0 0 24 24" aria-hidden="true">
            <use href="#mi-info" />
          </svg></button>
      </nav>
    </header>

    <main>
      <section id="pageWorklogs" class="page">
        <div class="toolbar">
          <button id="createButton" class="primary-button" type="button" data-i18n="create">Create</button>
          <label class="date-field">
            <span class="sr-only">Date</span>
            <input id="selectedDate" type="date" />
          </label>
          <div class="total-time"><span data-i18n="total">Total</span>: <strong id="totalTime">00:00</strong></div>
        </div>

        <div id="notice" class="notice hidden"></div>
        <div id="worklogList" class="worklog-list"></div>
      </section>

      <section id="pageSettings" class="page">
        <form id="settingsForm" class="card form-grid">
          <h2 data-i18n="settings">Settings</h2>
          <label>
            <span>Jira Host URL</span>
            <input id="jiraHost" type="url" placeholder="https://your-company.atlassian.net" autocomplete="url"
              required />
          </label>
          <label>
            <span>Email</span>
            <input id="jiraEmail" type="email" autocomplete="username" required />
          </label>
          <label>
            <span>API token</span>
            <input id="jiraToken" type="password" autocomplete="current-password" required />
          </label>
          <div class="two-cols">
            <label>
              <span data-i18n="theme">Theme</span>
              <select id="themeMode">
                <option value="system">System</option>
                <option value="dark">Dark</option>
                <option value="light">Light</option>
              </select>
            </label>
            <label>
              <span data-i18n="language">Language</span>
              <select id="languageMode">
                <option value="system">System</option>
                <option value="de">German</option>
                <option value="en">English</option>
              </select>
            </label>
          </div>
          <div class="button-row">
            <button class="primary-button" type="submit" data-i18n="save">Save</button>
          </div>
        </form>
      </section>

      <section id="pageInfo" class="page">
        <div class="card info-card">
          <h2>JiraLog</h2>
          <p><strong>Version:</strong> 1.0.0</p>
          <p><strong>Author:</strong> Alexander Karge</p>
          <p data-i18n="infoText">Fast day-based Jira worklog tracking from the browser popup.</p>
          <p><strong>License:</strong> MIT</p>
        </div>
      </section>
    </main>
  </div>

  <dialog id="worklogDialog" class="modal">
    <form id="worklogForm" method="dialog" class="modal-content">
      <div class="modal-header">
        <h2 data-i18n="createWorklog">Create worklog</h2>
        <button id="closeDialogButton" class="icon-button" type="button" title="Close" aria-label="Close"><svg
            class="mi" viewBox="0 0 24 24" aria-hidden="true">
            <use href="#mi-close" />
          </svg></button>
      </div>

      <label>
        <span data-i18n="ticket">Ticket</span>
        <div class="ticket-select" id="ticketSelect">
          <button id="ticketDropdownToggle" class="ticket-dropdown-button" type="button" aria-haspopup="listbox"
            aria-expanded="false">
            <span class="ticket-dropdown-selection">
              <img id="ticketDropdownTypeIcon" class="ticket-item-type-icon" alt="" hidden />
              <span id="ticketDropdownLabel" data-i18n="ticket">Ticket</span>
            </span>
            <span class="ticket-dropdown-caret" aria-hidden="true"><svg class="mi" viewBox="0 0 24 24">
                <use href="#mi-expand-more" />
              </svg></span>
          </button>
          <div id="ticketDropdownPanel" class="ticket-dropdown-panel hidden">
            <div class="ticket-search-row">
              <input id="ticketSearch" type="search" autocomplete="off" />
            </div>
            <div id="ticketResults" class="ticket-results" role="listbox"></div>
          </div>
        </div>
      </label>

      <label>
        <span data-i18n="duration">Duration</span>
        <input id="durationInput" type="text" placeholder="30m, 1h, 01:30" required />
      </label>

      <label>
        <span data-i18n="comment">Comment</span>
        <textarea id="commentEditor" class="comment-editor" rows="6" spellcheck="true"></textarea>
      </label>

      <div class="button-row">
        <button id="cancelDialogButton" class="secondary-button" type="button" data-i18n="cancel">Cancel</button>
        <button id="saveWorklogButton" class="primary-button" type="submit" data-i18n="save" disabled>Save</button>
      </div>
    </form>
  </dialog>

  <svg width="0" height="0" style="position:absolute;left:-9999px;overflow:hidden" aria-hidden="true" focusable="false">
    <symbol id="mi-schedule" viewBox="0 0 24 24">
      <path
        d="M12 1.75A10.25 10.25 0 1 0 22.25 12 10.26 10.26 0 0 0 12 1.75Zm0 18.5a8.25 8.25 0 1 1 8.25-8.25A8.26 8.26 0 0 1 12 20.25Zm.75-13h-1.5v5.19l4.28 2.57.77-1.28-3.55-2.13Z" />
    </symbol>
    <symbol id="mi-settings" viewBox="0 0 24 24">
      <path
        d="m19.14 12.94.04-.94-.04-.94 2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.36 7.36 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54a7.36 7.36 0 0 0-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.67 8.84a.5.5 0 0 0 .12.64l2.03 1.58-.04.94.04.94-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.38 1.05.7 1.63.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54c.58-.24 1.13-.56 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64ZM12 15.5A3.5 3.5 0 1 1 15.5 12 3.5 3.5 0 0 1 12 15.5Z" />
    </symbol>
    <symbol id="mi-info" viewBox="0 0 24 24">
      <path
        d="M11 17h2v-6h-2v6Zm1-8.75a1.25 1.25 0 1 0-1.25-1.25A1.25 1.25 0 0 0 12 8.25ZM12 2a10 10 0 1 0 10 10A10.01 10.01 0 0 0 12 2Zm0 18a8 8 0 1 1 8-8 8.01 8.01 0 0 1-8 8Z" />
    </symbol>
    <symbol id="mi-close" viewBox="0 0 24 24">
      <path
        d="M18.3 5.71 12 12.01l-6.3-6.3-1.41 1.41 6.3 6.3-6.3 6.3 1.41 1.41 6.3-6.3 6.3 6.3 1.41-1.41-6.3-6.3 6.3-6.3-1.41-1.41Z" />
    </symbol>
    <symbol id="mi-expand-more" viewBox="0 0 24 24">
      <path d="m7.41 8.59 4.59 4.58 4.59-4.58L18 10l-6 6-6-6 1.41-1.41Z" />
    </symbol>
    <symbol id="mi-open-in-new" viewBox="0 0 24 24">
      <path
        d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2Zm-5-16v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3Z" />
    </symbol>
    <symbol id="mi-chat" viewBox="0 0 24 24">
      <path d="M4 4h16a2 2 0 0 1 2 2v14l-4-4H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 2v8h14.83L20 15.17V6Z" />
    </symbol>
    <symbol id="mi-chat-filled" viewBox="0 0 24 24">
      <path d="M4 2h16a2 2 0 0 1 2 2v18l-4-4H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Z" />
    </symbol>
    <symbol id="mi-mode-comment" viewBox="0 0 24 24">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M22 2H2v20l4-4h16V2ZM20 16H5.17L4 17.17V4h16v12Z" />
    </symbol>
    <symbol id="mi-comment" viewBox="0 0 24 24">
      <path d="M21.99 4A2 2 0 0 0 20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4Z" />
    </symbol>
    <symbol id="mi-delete" viewBox="0 0 24 24">
      <path
        d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6Zm3.46-8.12 1.41-1.41L12 10.59l1.12-1.12 1.41 1.41L13.41 12l1.12 1.12-1.41 1.41L12 13.41l-1.12 1.12-1.41-1.41L10.59 12ZM15.5 4l-1-1h-5l-1 1H5v2h14V4Z" />
    </symbol>
    <symbol id="mi-star" viewBox="0 0 24 24">
      <path d="m12 17.27 6.18 3.73-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21Z" />
    </symbol>
    <symbol id="mi-star-outline" viewBox="0 0 24 24">
      <path
        d="m22 9.24-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03ZM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.7 4.03 4.38.38-3.32 2.88 1 4.28Z" />
    </symbol>
  </svg>

  <script src="popup.js"></script>
</body>

</html>
